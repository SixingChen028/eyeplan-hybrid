[sbatch]
time = "6:00:00"
mem_per_cpu = "1000M"

[params]
# environment
num_nodes = 15
t_max = 50
cost = [0.01, 0.02, 0.03, 0.04, 0.08, 0.12, 0.16, 0.20, 0.24]
beta_move = 100.0
eps_move = 0.0
learning_rate = 1.0
wm_decay = 1.0
lamda_backup = 1.0
# network
# training
algo = 'ppo'

seed = [1, 2]
num_updates = 30_000
num_envs = 128
rollout_length = 50
# GAE
gamma = 1.0
lr = 0.001
lamda = 0.8
# loss
beta_e_init = 0.02
beta_e_final = 0.0001
beta_v = 0.05
max_grad_norm = 2.0
