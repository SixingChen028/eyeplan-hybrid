[meta]
array_vars = ["wm_decay"]

[sbatch]
time = "2:00:00"
gpu = true

[params]

beta_e_final = 0.005  # bumped
use_recency_obs = false  # perhaps reconsider

t_max = 100
cost = [0.001, 0.01, 0.02, 0.03, 0.04, 0.08, 0.12, 0.16, 0.2, 0.24]
seed = [1, 2, 3, 4, 5]
num_envs = 128
num_updates = 50_000


[[conditions]]
label = "wm_only"
wm_decay = [0.0, 0.5, 0.75, 0.9, 0.95, 0.975, 1.0]
wm_neighbor_activation = 0.5
forget_rate = 1.0  # forget everything outside of WM

[[conditions]]
label = "unbounded"
wm_decay = 1.0
wm_neighbor_activation = 1.0
disable_corruption = true

[[conditions]]
label = "optimal"
beta_e_final = 0.0
wm_decay = 1.0
wm_neighbor_activation = 1.0
disable_corruption = true


