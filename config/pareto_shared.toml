[meta]
experiment = "pareto_shared_v3"
array_vars = ["seed"]

[environment]
wm_decay = [0.0, 0.5, 1.0]
cost = [0.001, 0.01, 0.02, 0.03, 0.04, 0.08, 0.12, 0.16, 0.2, 0.24]

[training]
beta_e_final = 0.0001
seed = [1, 2]
