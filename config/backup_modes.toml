[meta]
array_vars = ["seed"]

[environment]
backup_mode = ["full", "wm_both", "wm_zero", "wm_partial"]
wm_decay = [0.0, 0.4, 0.5, 0.6, 1]
cost = [0.001, 0.005, 0.01, 0.05, 0.10]

[training]
num_envs = 64
num_updates = 30_000
seed = [1, 2, 3]

[network]
network_type = "node_shared"
hidden_size = 64

[sbatch]
time = "1:00:00"
mem_per_cpu = "4000M"
gpu = true
